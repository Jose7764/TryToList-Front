<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Tarefas</title>
</head>

<body class="bg-gray-100">

  
  <header class="flex justify-between items-center px-10 py-4 bg-white border-b">
    
    <div class="flex items-center gap-3">
      <img src="/images/icon_verde.png" class="w-5 h-5">
      <h1 class="font-medium text-base">Tarefas</h1>
    </div>

   
        <a href="/login.html" class="flex items-center gap-2 text-gray-500 text-sm cursor-pointer">
            <img src="/images/sair.png" class="w-4 h-4">
            <span>Sair</span>
        </a>
   

  </header>

 
  <div class="max-w-5xl mx-auto mt-8">

    <div class="flex gap-6">

      
      <div class="w-1/3">

        
        <div class="flex items-center gap-2 mb-4">

          
            <img 
                id="arrowIcon"
                src="/images/simbolo-maior-que.png" 
                class="w-4 h-4 cursor-pointer transition-transform"
                onclick="toggleFinalizadas()"
            >

          <span class="font-medium text-gray-700 text-sm">
            Finalizadas
          </span>

          <span class="bg-gray-200 text-xs px-2 py-0.5 rounded-full">
            2
          </span>
        </div>

        
        <div id="finalizadas" class="space-y-3">


        </div>

    </div>

      
      <div class="w-2/3">

        
        <div class="flex items-center gap-3 mb-5">

          <input
            type="text"
            placeholder="Buscar tarefas..."
            class="flex-1 p-2.5 text-sm rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#25937D]"
          >

            <button onclick="abrirModal()" class="bg-[#25937D] text-white px-4 py-2 rounded-lg text-sm">
            + Nova tarefa
            </button>

        </div>

        
        <div class="flex gap-2 mb-5 items-center">

          <img src="img/filter.png" class="w-4 h-4">

          <button class="bg-[#25937D] text-white px-3 py-1 rounded-full text-xs">
            Todas
          </button>

          <button class="bg-gray-200 px-3 py-1 rounded-full text-xs text-gray-600">
            Alta
          </button>

          <button class="bg-gray-200 px-3 py-1 rounded-full text-xs text-gray-600">
            Média
          </button>

          <button class="bg-gray-200 px-3 py-1 rounded-full text-xs text-gray-600">
            Baixa
          </button>

        </div>

        <div id="tarefas" class="space-y-4">

  

  

</div>
      </div>

    </div>

  </div>

  <div class="fixed bottom-6 right-6">
    <button onclick="abrirChat()" class="bg-[#25937D] w-14 h-14 rounded-full flex items-center justify-center shadow-lg">
      <img src="images/tecnologia-de-ia.png" class="w-5 h-5">
    </button>
  </div>

<div id="modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center">

  <div class="bg-white w-[400px] p-6 rounded-xl shadow-lg relative">

    <button onclick="fecharModal()" class="absolute top-3 right-3 text-gray-500">
      ✕
    </button>

    <h2 class="text-lg font-semibold mb-4">Nova tarefa</h2>

    <div class="mb-3">
      <label class="text-sm text-gray-600">Título</label>
      <input id="tituloInput" type="text" placeholder="O que precisa ser feito?"
        class="w-full mt-1 p-2 rounded-md border focus:ring-2 focus:ring-[#25937D] outline-none">
    </div>

    <div class="mb-3">
      <label class="text-sm text-gray-600">Conteúdo</label>
      <textarea id="conteudoInput" placeholder="Detalhes da tarefa..."
        class="w-full mt-1 p-2 rounded-md border outline-none"></textarea>
    </div>

    <div class="flex gap-3 mb-4">

      <div class="flex-1">
        <label class="text-sm text-gray-600">Prioridade</label>
        <select id="prioridadeInput" class="w-full mt-1 p-2 border rounded-md">
          <option>Alta</option>
          <option>Média</option>
          <option>Baixa</option>
        </select>
      </div>

      <div class="flex-1">
        <label class="text-sm text-gray-600">Data</label>
        <input id="dataInput" type="date" class="w-full mt-1 p-2 border rounded-md">
      </div>

    </div>

    <button onclick="adicionarTarefa()" class="w-full bg-[#25937D] text-white py-2 rounded-md">
        Adicionar tarefa
    </button>

  </div>
</div>

<div id="chat" class="fixed bottom-24 right-6 w-80 bg-white rounded-xl shadow-lg hidden flex-col overflow-hidden transition-all duration-300">
 
  <div class="flex justify-between items-center px-4 py-3 border-b">
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 bg-green-500 rounded-full"></span>
      <span class="text-sm font-medium">Assistente IA</span>
    </div>

    <button onclick="fecharChat()" class="text-gray-500">✕</button>
  </div>

  <div class="p-4 space-y-3 h-64 overflow-y-auto bg-gray-50">

    <div class="bg-gray-200 text-sm p-2 rounded-lg w-fit max-w-[80%]">
      Olá 👋 Sou seu assistente de tarefas. Como posso ajudar?
    </div>

  </div>

  <div class="flex items-center gap-2 p-3 border-t">

    <input type="text" placeholder="Digite sua mensagem..."
      class="flex-1 p-2 text-sm border rounded-lg outline-none">

    <button class="bg-[#25937D] text-white p-2 rounded-lg">
      ➤
    </button>

  </div>

</div>
<script>
document.addEventListener("DOMContentLoaded", () => {

  render();

  const modal = document.getElementById('modal');

  modal.addEventListener('click', function(e) {
    if (e.target === modal) {
      fecharModal();
    }
  });

});
</script>
<script src="app.js"></script>
</body>
</html>
